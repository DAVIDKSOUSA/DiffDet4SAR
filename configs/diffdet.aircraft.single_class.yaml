_BASE_: "Base-DiffusionDet.yaml"

MODEL:
  WEIGHTS: "detectron2://ImageNetPretrained/torchvision/R-50.pkl"
  RESNETS:
    DEPTH: 50
    STRIDE_IN_1X1: False
  DiffusionDet:
    NUM_PROPOSALS: 500
    NUM_CLASSES: 1
    SNR_SCALE: 1.0

DATASETS:
  TRAIN: ("aircraft_single_class_train",)
  TEST: ("aircraft_single_class_val",)

SOLVER:
  IMS_PER_BATCH: 8
  BASE_LR: 0.000005
  GAMMA: 0.05
  STEPS: (14000, 18000)
  MAX_ITER: 20000
  CHECKPOINT_PERIOD: 2000

TEST:
  EVAL_PERIOD: 2000

INPUT:
  CROP:
    ENABLED: False
  FORMAT: "RGB"

OUTPUT_DIR: "./output_aircraft_single_class"
