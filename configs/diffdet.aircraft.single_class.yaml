_BASE_: "Base-DiffusionDet.yaml"

MODEL:
  WEIGHTS: "detectron2://ImageNetPretrained/torchvision/R-50.pkl"
  RESNETS:
    DEPTH: 50
    STRIDE_IN_1X1: False
  DiffusionDet:
    NUM_PROPOSALS: 500
    NUM_CLASSES: 1

DATASETS:
  TRAIN: ("coco_2017_train",)
  TEST: ("coco_2017_val",)

SOLVER:
  IMS_PER_BATCH: 2
  BASE_LR: 0.000005
  GAMMA: 0.05
  STEPS: (4000, 8000)
  MAX_ITER: 10000
  CHECKPOINT_PERIOD: 1000

TEST:
  EVAL_PERIOD: 1000

INPUT:
  CROP:
    ENABLED: False
  FORMAT: "RGB"

OUTPUT_DIR: "./output_aircraft_single_class"
